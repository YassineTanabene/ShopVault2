name: Deploy — Full Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_environment: dev
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  TF_VAR_app_name: ecommerce
  TF_VAR_db_name: ecommerce_dev
  TF_VAR_db_username: ecommerceadmin
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_backend_image: ${{ secrets.DOCKERHUB_USERNAME }}/shopvault-backend:${{ github.sha }}
  TF_VAR_frontend_image: ${{ secrets.DOCKERHUB_USERNAME }}/shopvault-frontend:${{ github.sha }}
  TF_VAR_backend_instance_type: t3.micro
  TF_VAR_frontend_instance_type: t3.micro
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
  TF_VAR_jwt_refresh_secret: ${{ secrets.JWT_REFRESH_SECRET }}
  TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
  TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  TF_VAR_next_public_stripe_publishable_key: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
  TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
  TF_VAR_dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  # ===========================================================================
  # Job 1 — Build & Push Docker images
  # ===========================================================================
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        working-directory: backend
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/shopvault-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/shopvault-backend:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shopvault-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shopvault-backend:${{ github.sha }}

      - name: Build and push frontend image
        working-directory: frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="" \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/shopvault-frontend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/shopvault-frontend:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shopvault-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shopvault-frontend:${{ github.sha }}

  # ===========================================================================
  # Job 2 — Terraform : provisioning AWS infrastructure
  # ===========================================================================
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-push
    outputs:
      alb_dns:      ${{ steps.tf-output.outputs.alb_dns }}
      frontend_ip:  ${{ steps.tf-output.outputs.frontend_ip }}
      frontend_dns: ${{ steps.tf-output.outputs.frontend_dns }}
      asg_name:     ${{ steps.tf-output.outputs.asg_name }}
      rds_host:     ${{ steps.tf-output.outputs.rds_host }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Create Terraform state bucket (if not exists)
        run: |
          BUCKET="ecommerce-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}"
          if ! aws s3 ls "s3://$BUCKET" 2>/dev/null; then
            aws s3 mb "s3://$BUCKET" --region ${{ secrets.AWS_REGION }}
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infrastructure
        run: |
          rm -f terraform.tfstate terraform.tfstate.backup .terraform.lock.hcl
          rm -rf .terraform
          terraform init \
            -backend-config="bucket=ecommerce-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="key=state/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Validate
        working-directory: infrastructure
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure
        run: terraform plan -var-file=environments/dev.tfvars -out=tfplan

      - name: Terraform Apply
        working-directory: infrastructure
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: tf-output
        working-directory: infrastructure
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name       2>/dev/null || echo "")
          FRONTEND_IP=$(terraform output -raw frontend_public_ip  2>/dev/null || echo "")
          FRONTEND_DNS=$(terraform output -raw frontend_public_dns 2>/dev/null || echo "")
          ASG_NAME=$(terraform output -raw backend_asg_name  2>/dev/null || echo "")

          # Outputs — alb_dns AVANT tout masquage
          echo "alb_dns=$ALB_DNS"          >> $GITHUB_OUTPUT
          echo "frontend_ip=$FRONTEND_IP"  >> $GITHUB_OUTPUT
          echo "frontend_dns=$FRONTEND_DNS" >> $GITHUB_OUTPUT
          echo "asg_name=$ASG_NAME"        >> $GITHUB_OUTPUT
          # rds_host non expose en output (sensible) — resolu dans le job seed via AWS CLI

          echo ""
          echo "=============================================="
          echo "  DEPLOYMENT COMPLETE"
          echo "=============================================="
          echo "  FRONTEND : http://$FRONTEND_IP"
          echo "  ALB DNS  : http://$ALB_DNS"
          echo "  Health   : http://$ALB_DNS/health"
          echo "  ASG      : $ASG_NAME"
          echo "  Admin    : admin@example.com / Password123!"
          echo "  User     : user@example.com  / Password123!"
          echo "=============================================="

  # ===========================================================================
  # Job 3 — Database Seed (une seule fois, idempotent)
  # Strategy :
  #   1. Attendre que le backend soit healthy via ALB
  #   2. Check idempotent : tenter login admin — si 200, skip
  #   3. Sinon : SSM port-forward localhost:5432 → EC2 backend → RDS
  #   4. Exécuter seed.ts depuis le runner GitHub Actions
  #   5. Fermer le tunnel
  # ===========================================================================
  seed:
    name: Database Seed (one-time, idempotent)
    runs-on: ubuntu-latest
    needs: terraform
    # Pas d'env globaux issus de job outputs (risque de masquage).
    # Tous les endpoints sont resolus dans le job via AWS CLI.
    env:
      DB_NAME: ecommerce_dev
      DB_USER: ecommerceadmin
      APP_NAME: ecommerce
      ENV_NAME: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 0. Résoudre les endpoints directement via AWS CLI ────────────────
      # Fix: ne pas dépendre des job outputs (risque de masquage par ::add-mask::)
      # ALB DNS et RDS host sont obtenus fresh depuis l'API AWS
      - name: Resolve infrastructure endpoints (AWS CLI)
        run: |
          # ALB DNS — non sensible
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "${APP_NAME}-${ENV_NAME}-backend-alb" \
            --query 'LoadBalancers[0].DNSName' \
            --output text 2>/dev/null || echo "")
          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_ENV
          echo "[OK] ALB DNS: $ALB_DNS"

          # ASG name
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --filters "Name=tag:aws:cloudformation:stack-name,Values=*" \
            --query "AutoScalingGroups[?contains(AutoScalingGroupName, '${APP_NAME}-${ENV_NAME}-backend-asg')].AutoScalingGroupName" \
            --output text 2>/dev/null | awk '{print $1}')
          # Fallback: construire le nom directement
          [ -z "$ASG_NAME" ] && ASG_NAME="${APP_NAME}-${ENV_NAME}-backend-asg"
          echo "ASG_NAME=$ASG_NAME" >> $GITHUB_ENV
          echo "[OK] ASG: $ASG_NAME"

          # RDS host — sensible, masque immediatement
          RDS_HOST=$(aws rds describe-db-instances \
            --db-instance-identifier "${APP_NAME}-${ENV_NAME}-db" \
            --query 'DBInstances[0].Endpoint.Address' \
            --output text 2>/dev/null || echo "")
          echo "::add-mask::$RDS_HOST"
          echo "RDS_HOST=$RDS_HOST" >> $GITHUB_ENV
          echo "[OK] RDS host resolved (value masked in logs)"

      # ── 1. Attendre que le backend soit healthy ──────────────────────────
      - name: Wait for backend to be healthy (max 10 min)
        run: |
          echo "Waiting for ALB backend health check..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "[OK] Backend healthy after ${i}x10s"
              break
            fi
            echo "  Attempt $i/60 — HTTP $STATUS — retrying in 10s..."
            sleep 10
          done

      # ── 2. Vérification idempotent : login admin ─────────────────────────
      # Si le compte admin existe déjà → base déjà seedée → on skip
      - name: Check if database is already seeded
        id: check-seed
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://$ALB_DNS/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@example.com","password":"Password123!"}' \
            --max-time 10 || echo "000")

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "already_seeded=true" >> $GITHUB_OUTPUT
            echo "[SKIP] Admin login returned $STATUS — database already seeded"
          else
            echo "already_seeded=false" >> $GITHUB_OUTPUT
            echo "[INFO] Admin login returned $STATUS — will run seed"
          fi

      # ── 3. Récupérer une instance backend InService ──────────────────────
      - name: Get one InService backend EC2 instance
        if: steps.check-seed.outputs.already_seeded == 'false'
        id: get-instance
        run: |
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text 2>/dev/null | awk '{print $1}')

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "[ERROR] No InService instance in $ASG_NAME"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "[OK] Using instance: $INSTANCE_ID"

      # ── 4. Installer le plugin SSM Session Manager ───────────────────────
      - name: Install AWS SSM Session Manager plugin
        if: steps.check-seed.outputs.already_seeded == 'false'
        run: |
          curl -sL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/smp.deb
          sudo dpkg -i /tmp/smp.deb
          session-manager-plugin --version

      # ── 5. Ouvrir le tunnel SSM : localhost:5432 → EC2 → RDS:5432 ────────
      - name: Start SSM port-forwarding tunnel to RDS
        if: steps.check-seed.outputs.already_seeded == 'false'
        run: |
          # RDS_HOST est dans $GITHUB_ENV (masque) — safe pour le tunnel
          aws ssm start-session \
            --target "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name AWS-StartPortForwardingSessionToRemoteHost \
            --parameters "{\"host\":[\"$RDS_HOST\"],\"portNumber\":[\"5432\"],\"localPortNumber\":[\"5432\"]}" &
          echo "SSM_TUNNEL_PID=$!" >> $GITHUB_ENV
          echo "[INFO] SSM tunnel starting, waiting 8s..."
          sleep 8

      # ── 6. Setup Node.js + dépendances ───────────────────────────────────
      - name: Setup Node.js 20
        if: steps.check-seed.outputs.already_seeded == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies (Prisma + ts-node)
        if: steps.check-seed.outputs.already_seeded == 'false'
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        if: steps.check-seed.outputs.already_seeded == 'false'
        working-directory: backend
        run: npx prisma generate --schema=src/prisma/schema.prisma

      # ── 7. Exécuter le seed via le tunnel SSM ────────────────────────────
      # Fix module resolution : seed.ts importe @prisma/client et bcrypt qui
      # sont dans backend/node_modules. Node.js résout les modules depuis le
      # répertoire du FICHIER (scripts/), pas depuis le CWD.
      # Solution : copier seed.ts dans backend/scripts/ puis l'exécuter depuis backend/.
      # --transpile-only : ignore les erreurs TS7006 (implicit any) sans modifier seed.ts.
      - name: Run database seed
        if: steps.check-seed.outputs.already_seeded == 'false'
        working-directory: backend
        env:
          # DATABASE_URL pointe vers localhost:5432 (tunnel SSM → RDS)
          DATABASE_URL: "postgresql://${{ env.DB_USER }}:${{ secrets.DB_PASSWORD }}@localhost:5432/${{ env.DB_NAME }}"
        run: |
          echo "[INFO] Copying seed.ts into backend/scripts/ for module resolution..."
          mkdir -p scripts
          cp ../scripts/seed.ts scripts/seed.ts

          echo "[INFO] Running seed via SSM tunnel..."
          npx ts-node --project tsconfig.json --transpile-only scripts/seed.ts

          rm -f scripts/seed.ts
          echo "[OK] Seed completed successfully"


      # ── 8. Fermer le tunnel SSM ───────────────────────────────────────────
      - name: Stop SSM tunnel
        if: always() && steps.check-seed.outputs.already_seeded == 'false'
        run: |
          if [ -n "$SSM_TUNNEL_PID" ]; then
            kill "$SSM_TUNNEL_PID" 2>/dev/null || true
            echo "[OK] SSM tunnel closed"
          fi
